name: Test traffic management inputs
on:
  workflow_dispatch:
jobs:
  test-revision-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          service: my-cloudrun-service
          image: us-docker.pkg.dev/cloudrun/container/hello:latest
          revision_traffic: 'LATEST=100'
          update_traffic_flags: '--platform=managed'
          project_id: my-gcp-project
          region: us-central1
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi

  test-tag-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          service: my-cloudrun-service
          image: us-docker.pkg.dev/cloudrun/container/hello:latest
          tag_traffic: 'canary=10'
          project_id: my-gcp-project
          region: us-central1
      - name: Assert action ran
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
