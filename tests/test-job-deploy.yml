name: Test job deploy inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          job: my-cloudrun-job
          image: us-docker.pkg.dev/cloudrun/container/hello:latest
          project_id: my-gcp-project
          region: us-central1
          gcloud_component: alpha
          wait: 'false'
      - name: Assert action ran (with or without credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
